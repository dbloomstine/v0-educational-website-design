<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" width="1500" height="1500">
  <defs>
    <radialGradient id="pc3Bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#F0C065"/>
      <stop offset="100%" stop-color="#C98E1E"/>
    </radialGradient>
    <path id="pc3Circ" d="M 750, 750 m -520, 0 a 520,520 0 1,1 1040,0 a 520,520 0 1,1 -1040,0"/>
  </defs>

  <rect width="1500" height="1500" fill="url(#pc3Bg)"/>

  <!-- Navy rule strips -->
  <rect x="0" y="0" width="1500" height="6" fill="#1E3A5F"/>
  <rect x="0" y="1494" width="1500" height="6" fill="#1E3A5F"/>

  <!-- Outer navy ring -->
  <circle cx="750" cy="750" r="640" fill="none" stroke="#1E3A5F" stroke-opacity="0.6" stroke-width="3"/>
  <circle cx="750" cy="750" r="615" fill="none" stroke="#1E3A5F" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="750" cy="750" r="555" fill="none" stroke="#1E3A5F" stroke-opacity="0.6" stroke-width="2"/>
  <circle cx="750" cy="750" r="525" fill="#E6B045"/>

  <!-- Orbital text -->
  <text font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="700" letter-spacing="14" fill="#1E3A5F" fill-opacity="0.85">
    <textPath href="#pc3Circ" startOffset="0">
      ★ FUNDOPSHQ ★ A DAILY NEWSROOM FOR PRIVATE MARKETS ★ EST. 2025 ★
    </textPath>
  </text>

  <!-- Core inner circle -->
  <circle cx="750" cy="750" r="420" fill="#1E3A5F"/>
  <circle cx="750" cy="750" r="405" fill="none" stroke="#E6B045" stroke-opacity="0.55" stroke-width="1"/>
  <circle cx="750" cy="750" r="378" fill="none" stroke="#E6B045" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Italic F -->
  <text x="750" y="900" font-family="serif" font-style="italic" font-size="620" font-weight="900" fill="#E6B045" text-anchor="middle">F</text>

  <!-- Inner ledger -->
  <line x1="560" y1="960" x2="940" y2="960" stroke="#E6B045" stroke-width="1"/>
  <text x="750" y="1005" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" letter-spacing="6" fill="#F8F5EC" fill-opacity="0.9" text-anchor="middle">FUNDOPSHQ</text>
  <text x="750" y="1040" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="4" fill="#E6B045" text-anchor="middle">THE DAILY BRIEF</text>
</svg>
