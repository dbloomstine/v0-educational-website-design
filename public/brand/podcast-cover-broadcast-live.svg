<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" width="1500" height="1500">
  <defs>
    <radialGradient id="pc4Bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#13243C"/>
      <stop offset="100%" stop-color="#050B14"/>
    </radialGradient>
    <pattern id="pc4Scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1500" height="1500" fill="url(#pc4Bg)"/>
  <rect width="1500" height="1500" fill="url(#pc4Scan)"/>

  <!-- Red LIVE side strips -->
  <rect x="0" y="0" width="8" height="1500" fill="#EF4444"/>
  <rect x="1492" y="0" width="8" height="1500" fill="#EF4444"/>

  <!-- Top ledger with LIVE tag -->
  <rect x="80" y="80" width="220" height="52" fill="#EF4444"/>
  <circle cx="112" cy="106" r="8" fill="#FFFFFF"/>
  <text x="200" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" letter-spacing="6" fill="#FFFFFF" text-anchor="middle">● LIVE</text>

  <text x="1420" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" letter-spacing="5" fill="#E6B045" text-anchor="end">BROADCAST</text>

  <!-- Large italic F -->
  <text x="750" y="980" font-family="serif" font-style="italic" font-size="1200" font-weight="900" fill="#FFFFFF" text-anchor="middle">F</text>

  <!-- Over-print LIVE text behind the F for depth -->
  <text x="750" y="800" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="260" font-weight="900" letter-spacing="16" fill="#EF4444" fill-opacity="0.12" text-anchor="middle">LIVE</text>

  <!-- Lower callout -->
  <g transform="translate(750, 1160)">
    <line x1="-280" y1="0" x2="-80" y2="0" stroke="#E6B045" stroke-width="1"/>
    <line x1="80" y1="0" x2="280" y2="0" stroke="#E6B045" stroke-width="1"/>
    <text x="0" y="8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" letter-spacing="5" fill="#E6B045" text-anchor="middle">FUNDOPSHQ LIVE</text>
    <text x="0" y="64" font-family="serif" font-style="italic" font-size="56" fill="#FFFFFF" text-anchor="middle">The live newsroom for private markets.</text>
    <text x="0" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="700" letter-spacing="5" fill="#FFFFFF" fill-opacity="0.6" text-anchor="middle">THURSDAYS  ·  11:00 AM ET  ·  LINKEDIN + YOUTUBE</text>
  </g>

  <!-- Bottom edge -->
  <rect x="0" y="1440" width="1500" height="60" fill="#EF4444"/>
  <text x="80" y="1478" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" letter-spacing="5" fill="#FFFFFF">ON AIR</text>
  <text x="1420" y="1478" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" letter-spacing="5" fill="#FFFFFF" text-anchor="end">FUNDOPSHQ.COM/LIVE</text>
</svg>
